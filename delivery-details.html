<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Delivery Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <div id="site-header"></div>

        <main class="container-xl mt-4 pb-5">
            <section class="checkout-steps">
                <div class="step-item">
                    <span class="step-num">1</span>
                    <span class="step-label">Cart Summary</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <span class="step-num">2</span>
                    <span class="step-label">Shipping &amp; Payment</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item active">
                    <span class="step-num">3</span>
                    <span class="step-label">Delivery Details</span>
                </div>
            </section>

            <section class="delivery-layout mt-2">
                <form class="delivery-form" id="delivery-form" novalidate>
                    <h2>Delivery Details</h2>

                    <div class="delivery-grid-2">
                        <div>
                            <label for="first-name">First Name</label>
                            <input id="first-name" name="firstName" type="text" required>
                        </div>
                        <div>
                            <label for="last-name">Last Name</label>
                            <input id="last-name" name="lastName" type="text" required>
                        </div>
                    </div>

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>

                    <label for="phone">Phone</label>
                    <input id="phone" name="phone" type="tel" required>

                    <label for="street-address">Street Address</label>
                    <input id="street-address" name="streetAddress" type="text" required>

                    <div class="delivery-grid-2">
                        <div>
                            <label for="city">City</label>
                            <input id="city" name="city" type="text" required>
                        </div>
                        <div>
                            <label for="zip-code">ZIP Code</label>
                            <input id="zip-code" name="zipCode" type="text" required>
                        </div>
                    </div>

                    <label for="country">Country</label>
                    <input id="country" name="country" type="text" required>

                    <label for="notes">Additional Notes (optional)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Any special delivery instructions..."></textarea>

                    <div class="delivery-recap" id="delivery-recap">
                        <p><strong>Shipping:</strong> <span id="recap-shipping">Courier Delivery</span></p>
                        <p><strong>Payment:</strong> <span id="recap-payment">Credit Card</span></p>
                        <p><strong>Total:</strong> <span id="recap-total">$1310.95</span></p>
                    </div>

                    <div class="delivery-actions">
                        <a href="shipping-payment.html" class="continue-btn continue-btn-light">Back</a>
                        <button type="submit" class="continue-btn" id="place-order">Place Order</button>
                    </div>
                    <p class="checkout-feedback" id="delivery-feedback" aria-live="polite"></p>
                </form>
            </section>
        </main>

        <div id="site-footer"></div>
    </div>

    <script src="layout.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
