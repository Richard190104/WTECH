<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <div id="site-header"></div>

        <main class="container-xl mt-4 pb-5">
            <section class="checkout-steps">
                <div class="step-item active">
                    <span class="step-num">1</span>
                    <span class="step-label">Cart Summary</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <span class="step-num">2</span>
                    <span class="step-label">Shipping &amp; Payment</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <span class="step-num">3</span>
                    <span class="step-label">Delivery Details</span>
                </div>
            </section>

            <section class="row g-3 mt-2">
                <div class="col-12 col-lg-8">
                    <div class="cart-table">
                        <div class="cart-head">
                            <div>Image</div>
                            <div>Product</div>
                            <div>Quantity</div>
                            <div>Price</div>
                            <div></div>
                        </div>

                        <div class="cart-row">
                            <div class="cart-thumb">×</div>
                            <div class="cart-product">HP ProBook 450 G9</div>
                            <div class="qty-box">
                                <button type="button">-</button>
                                <span>1</span>
                                <button type="button">+</button>
                            </div>
                            <div class="cart-price">$899.99</div>
                            <button class="remove-item" type="button">×</button>
                        </div>

                        <div class="cart-row">
                            <div class="cart-thumb">×</div>
                            <div class="cart-product">Wireless Mouse Pro</div>
                            <div class="qty-box">
                                <button type="button">-</button>
                                <span>2</span>
                                <button type="button">+</button>
                            </div>
                            <div class="cart-price">$99.98</div>
                            <button class="remove-item" type="button">×</button>
                        </div>

                        <div class="cart-row">
                            <div class="cart-thumb">×</div>
                            <div class="cart-product">USB-C Hub 7-in-1</div>
                            <div class="qty-box">
                                <button type="button">-</button>
                                <span>1</span>
                                <button type="button">+</button>
                            </div>
                            <div class="cart-price">$79.99</div>
                            <button class="remove-item" type="button">×</button>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <aside class="order-summary">
                        <h2>Order Summary</h2>

                        <div class="summary-line">
                            <span>Subtotal:</span>
                            <strong>$1079.96</strong>
                        </div>
                        <div class="summary-line">
                            <span>VAT (20%):</span>
                            <strong>$215.99</strong>
                        </div>
                        <div class="summary-line">
                            <span>Shipping:</span>
                            <strong>$15.00</strong>
                        </div>

                        <hr>

                        <div class="summary-total">
                            <span>Total:</span>
                            <strong>$1310.95</strong>
                        </div>

                        <button type="button" class="continue-btn">Continue to Shipping</button>
                    </aside>
                </div>
            </section>
        </main>

        <div id="site-footer"></div>
    </div>

    <script src="layout.js"></script>
</body>
</html>
