<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Admin Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell admin-page-shell">
        <header class="admin-topbar">
            <div class="container-xl admin-topbar-inner">
                <a href="index.html" class="admin-brand">ElectroHub Admin</a>
                <div class="admin-topbar-actions">
                    <a class="admin-btn admin-btn-secondary" href="admin-product-form.html">
                        <i class="fas fa-plus"></i> New product
                    </a>
                    <button type="button" class="admin-btn admin-btn-secondary js-admin-logout">
                        <i class="fas fa-right-from-bracket"></i> Logout
                    </button>

                </div>
            </div>
        </header>

        <main class="container-xl py-4">
            <section class="admin-panel" aria-labelledby="admin-products-title">
                <div class="admin-panel-header">
                    <div>
                        <h1 id="admin-products-title" class="admin-title">Product list</h1>
                        <p class="admin-subtitle">Number of products: <span id="admin-products-count">0</span></p>
                    </div>
                    <a class="admin-btn admin-btn-primary" href="admin-product-form.html">
                        <i class="fas fa-plus"></i> Add product
                    </a>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table" aria-label="Admin product table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Brand</th>
                                <th>Price</th>
                                <th>Discount</th>
                                <th>Quantity</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products-body"></tbody>
                    </table>
                </div>

                <div id="admin-empty-state" class="admin-empty" hidden>
                    <i class="fas fa-box-open"></i>
                    <p>No products yet. Create your first product.</p>
                    <a class="admin-btn admin-btn-primary" href="admin-product-form.html">Add product</a>
                </div>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
