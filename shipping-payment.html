<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Shipping & Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <div id="site-header"></div>

        <main class="container-xl mt-4 pb-5">
            <section class="checkout-steps">
                <div class="step-item">
                    <span class="step-num">1</span>
                    <span class="step-label">Cart Summary</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item active">
                    <span class="step-num">2</span>
                    <span class="step-label">Shipping &amp; Payment</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <span class="step-num">3</span>
                    <span class="step-label">Delivery Details</span>
                </div>
            </section>

            <section class="row g-3 mt-2">
                <div class="col-12 col-lg-8">
                    <div class="checkout-box mb-3" id="shipping-method-form">
                        <h2 class="checkout-box-title">Shipping Method</h2>
                        <label class="option-card is-selected">
                            <input type="radio" name="shipping_method" value="Courier Delivery" data-price="15" checked>
                            <span class="option-title">Courier Delivery</span>
                            <span class="option-note">Delivery in 1-2 business days - $15.00</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="shipping_method" value="Pickup Point" data-price="0">
                            <span class="option-title">Pickup Point</span>
                            <span class="option-note">Available at selected pickup point - $0.00</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="shipping_method" value="Personal Pickup" data-price="8">
                            <span class="option-title">Personal Pickup</span>
                            <span class="option-note">Pick up at our showroom in Nitra - $8.00</span>
                        </label>
                    </div>

                    <div class="checkout-box" id="payment-method-form">
                        <h2 class="checkout-box-title">Payment Method</h2>
                        <label class="option-card is-selected">
                            <input type="radio" name="payment_method" value="Credit Card" checked>
                            <span class="option-title">Credit Card</span>
                            <span class="option-note">Pay safely with your credit card</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="payment_method" value="Bank Transfer">
                            <span class="option-title">Bank Transfer</span>
                            <span class="option-note">Pay via bank transfer transfer</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="payment_method" value="PayPal">
                            <span class="option-title">PayPal</span>
                            <span class="option-note">Fast and secure payment via PayPal</span>
                        </label>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <aside class="order-summary">
                        <h2>Order Summary</h2>

                        <div class="summary-line">
                            <span>Subtotal:</span>
                            <strong id="summary-subtotal">$1079.96</strong>
                        </div>
                        <div class="summary-line">
                            <span>VAT (20%):</span>
                            <strong id="summary-vat">$215.99</strong>
                        </div>
                        <div class="summary-line">
                            <span>Shipping:</span>
                            <strong id="summary-shipping">$15.00</strong>
                        </div>

                        <hr>

                        <div class="summary-total">
                            <span>Total:</span>
                            <strong id="summary-total">$1310.95</strong>
                        </div>

                        <button type="button" class="continue-btn" id="continue-to-delivery">Continue to Delivery</button>
                        <p class="checkout-feedback" id="checkout-feedback" aria-live="polite"></p>
                    </aside>
                </div>
            </section>
        </main>

        <div id="site-footer"></div>
    </div>

    <script src="layout.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
