<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Shipping & Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <div id="site-header"></div>

        <main class="container-xl mt-4 pb-5">
            <h1 style="font-size: 2rem; margin-bottom: var(--spacing-lg); color: var(--text-primary);">
                <i class="fas fa-truck"></i> Shipping & Payment
            </h1>

            <section class="checkout-steps">
                <div class="step-item">
                    <span class="step-num">1</span>
                    <span class="step-label">Cart Summary</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item active">
                    <span class="step-num">2</span>
                    <span class="step-label">Shipping &amp; Payment</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item">
                    <span class="step-num">3</span>
                    <span class="step-label">Delivery Details</span>
                </div>
            </section>

            <section class="row g-3 mt-2">
                <div class="col-12 col-lg-8">
                    <div class="checkout-box mb-3" id="shipping-method-form">
                        <h2 class="checkout-box-title"><i class="fas fa-box"></i> Shipping Method</h2>
                        <label class="option-card is-selected">
                            <input type="radio" name="shipping_method" value="Courier Delivery" data-price="15" checked>
                            <span class="option-title"><i class="fas fa-truck"></i> Courier Delivery</span>
                            <span class="option-note">Delivery in 1-2 business days • $15.00</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="shipping_method" value="Pickup Point" data-price="0">
                            <span class="option-title"><i class="fas fa-location-dot"></i> Pickup Point</span>
                            <span class="option-note">Available at selected pickup points across the country • FREE</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="shipping_method" value="Personal Pickup" data-price="8">
                            <span class="option-title"><i class="fas fa-store"></i> Personal Pickup</span>
                            <span class="option-note">Pick up at our showroom in New York • $8.00</span>
                        </label>
                    </div>

                    <div class="checkout-box" id="payment-method-form">
                        <h2 class="checkout-box-title"><i class="fas fa-credit-card"></i> Payment Method</h2>
                        <label class="option-card is-selected">
                            <input type="radio" name="payment_method" value="Credit Card" checked>
                            <span class="option-title"><i class="fas fa-credit-card"></i> Credit Card</span>
                            <span class="option-note">Visa, Mastercard, American Express - Safe and Secure</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="payment_method" value="Bank Transfer">
                            <span class="option-title"><i class="fas fa-university"></i> Bank Transfer</span>
                            <span class="option-note">Direct bank transfer - 3-5 business days</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="payment_method" value="PayPal">
                            <span class="option-title"><i class="fab fa-paypal"></i> PayPal</span>
                            <span class="option-note">Fast and secure payment via your PayPal account</span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="payment_method" value="Apple Pay">
                            <span class="option-title"><i class="fab fa-apple"></i> Apple Pay</span>
                            <span class="option-note">One-click payment with your Apple ID</span>
                        </label>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <aside class="order-summary">
                        <h2><i class="fas fa-receipt"></i> Order Summary</h2>

                        <div class="summary-line">
                            <span>Subtotal:</span>
                            <strong id="summary-subtotal">$1,079.96</strong>
                        </div>
                        <div class="summary-line">
                            <span>VAT (20%):</span>
                            <strong id="summary-vat">$215.99</strong>
                        </div>
                        <div class="summary-line">
                            <span><i class="fas fa-shipping-fast"></i> Shipping:</span>
                            <strong id="summary-shipping">$15.00</strong>
                        </div>

                        <hr>

                        <div class="summary-total">
                            <span>Total:</span>
                            <strong id="summary-total">$1,310.95</strong>
                        </div>

                        <button type="button" class="continue-btn" id="continue-to-delivery">
                            <i class="fas fa-arrow-right"></i> Continue to Delivery
                        </button>
                        <p class="checkout-feedback" id="checkout-feedback" aria-live="polite"></p>

                        <div style="margin-top: var(--spacing-lg); background: #DBEAFE; border: 1px solid #93C5FD; border-radius: var(--radius-md); padding: var(--spacing-md); color: #1E40AF; font-size: 0.85rem; display: flex; gap: var(--spacing-sm);">
                            <i class="fas fa-info-circle" style="flex-shrink: 0; margin-top: 2px;"></i>
                            <span>We accept all major payment methods. Your payment is 100% secure with SSL encryption.</span>
                        </div>
                    </aside>
                </div>
            </section>
        </main>

        <div id="site-footer"></div>
    </div>

    <script src="layout.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
