<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Admin Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell admin-page-shell">
        <header class="admin-topbar">
            <div class="container-xl admin-topbar-inner">
                <a href="admin-products.html" class="admin-brand">ElectroHub Admin</a>
                <div class="admin-topbar-actions">
                    <a class="admin-btn admin-btn-secondary" href="admin-products.html">
                        <i class="fas fa-list"></i> Product list
                    </a>

                </div>
            </div>
        </header>

        <main class="container-xl py-4">
            <section class="admin-panel" aria-labelledby="admin-form-title">
                <h1 id="admin-form-title" class="admin-title">Add product</h1>
                <p class="admin-subtitle">A product must contain a name, description, and at least 2 photos.</p>

                <form id="admin-product-form" class="admin-form-grid" novalidate>
                    <div class="admin-form-field admin-col-2">
                        <label for="product-name">Product name</label>
                        <input type="text" id="product-name" class="admin-input" required>
                    </div>

                    <div class="admin-form-field admin-col-2">
                        <label for="product-description">Description</label>
                        <textarea id="product-description" class="admin-input admin-textarea" rows="4" required></textarea>
                    </div>

                    <div class="admin-form-field">
                        <label for="product-category">Category</label>
                        <select id="product-category" class="admin-input" required>
                            <option value="">Select category</option>
                            <option value="Computers">Computers</option>
                            <option value="Gaming">Gaming</option>
                            <option value="Phones">Phones</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>

                    <div class="admin-form-field">
                        <label for="product-brand">Brand</label>
                        <input type="text" id="product-brand" class="admin-input" required>
                    </div>

                    <div class="admin-form-field">
                        <label for="product-color">Color</label>
                        <select id="product-color" class="admin-input" required>
                            <option value="">Select color</option>
                            <option value="Black">Black</option>
                            <option value="White">White</option>
                            <option value="Gray">Gray</option>
                            <option value="Blue">Blue</option>
                            <option value="Red">Red</option>
                        </select>
                    </div>

                    <div class="admin-form-field">
                        <label for="product-price">Price ($)</label>
                        <input type="number" id="product-price" class="admin-input" min="0" step="0.01" required>
                    </div>

                    <div class="admin-form-field">
                        <label for="product-stock">Items in stock</label>
                        <input type="number" id="product-stock" class="admin-input" min="0" step="1" required>
                    </div>

                    <div class="admin-form-field admin-col-2">
                        <label for="product-image-1">Photo 1 (file path)</label>
                        <input type="text" id="product-image-1" class="admin-input" placeholder="images/Playdock%205%20console.jpg" required>
                    </div>

                    <div class="admin-form-field admin-col-2">
                        <label for="product-image-2">Photo 2 (file path)</label>
                        <input type="text" id="product-image-2" class="admin-input" placeholder="images/smartphone%20x12.jpg" required>
                    </div>

                    <p id="admin-form-feedback" class="admin-feedback admin-col-2" aria-live="polite"></p>

                    <div class="admin-form-actions admin-col-2">
                        <a href="admin-products.html" class="admin-btn admin-btn-secondary">Cancel</a>
                        <button id="admin-form-submit" type="submit" class="admin-btn admin-btn-primary">Save product</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
