<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell admin-page-shell">
        <main class="admin-login-main">
            <section class="admin-login-card" aria-labelledby="admin-login-title">
                <div class="admin-login-icon" aria-hidden="true">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 id="admin-login-title">Administrator Area</h1>
                <p class="admin-login-subtitle">Sign in as admin to manage products.</p>

                <form id="admin-login-form" class="admin-form" novalidate>
                    <div class="admin-form-field">
                        <label for="admin-email">Email</label>
                        <input type="email" id="admin-email" name="email" class="admin-input" placeholder="admin@electrohub.sk" autocomplete="email" required>
                    </div>

                    <div class="admin-form-field">
                        <label for="admin-password">Password</label>
                        <input type="password" id="admin-password" name="password" class="admin-input" placeholder="Admin123!" autocomplete="current-password" required>
                    </div>

                    <p id="admin-login-feedback" class="admin-feedback" aria-live="polite"></p>

                    <button type="submit" class="admin-btn admin-btn-primary">
                        <i class="fas fa-right-to-bracket"></i>
                        Sign In
                    </button>
                </form>

                <div class="admin-login-hint">
                    <strong>Demo credentials:</strong>
                    <span>admin / admin</span>
                </div>

                <a href="index.html" class="admin-back-link"><i class="fas fa-arrow-left"></i> Back to shop</a>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
