<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <header class="border-wrap">
    <div class="header-top">
        <div class="container-xl d-flex justify-content-between align-items-center flex-wrap gap-2">
            <nav>
                <ul class="list-unstyled d-flex align-items-center mb-0 small m-0 top-links">
                    <li><a href="#">Articles & Support</a></li>
                    <li class="divider">|</li>
                    <li><a href="#">Contact Us</a></li>
                    <li class="divider">|</li>
                    <li><a href="#">Track Order</a></li>
                </ul>
            </nav>

            <form class="d-flex align-items-center gap-2 auth-form" action="#">
                <input type="email" class="form-control form-control-sm neutral-input" placeholder="email" aria-label="email">
                <input type="password" class="form-control form-control-sm neutral-input" placeholder="password" aria-label="password">
                <button type="submit" class="btn btn-sm neutral-btn">Login</button>
                <a href="register.html" class="small register-link">Register</a>
            </form>
        </div>
    </div>

    <div class="border-bottom-wrap">
        <div class="container-xl py-2">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-2">
                    <a class="logo-box text-decoration-none text-reset" href="index.html">ElectroHub</a>
                </div>
                <div class="col-12 col-md-7">
                    <div class="input-group">
                        <span class="input-group-text" style="background: transparent; border: 1px solid var(--border); border-right: none;">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="search" class="form-control neutral-search" placeholder="Search for products..." aria-label="Search for products" style="border-left: none;">
                    </div>
                </div>
                <div class="col-12 col-md-3 d-flex gap-2 justify-content-md-end">
                    <a class="btn cart-btn" href="cart.html">
                        <i class="fas fa-shopping-cart"></i>
                        Cart
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div>
        <nav class="container-xl py-1">
            <ul class="list-unstyled d-flex flex-wrap gap-4 mb-0 category-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="product-list.html"><i class="fas fa-laptop"></i> Computers</a></li>
                <li><a href="product-list.html"><i class="fas fa-gamepad"></i> Gaming</a></li>
                <li><a href="product-list.html"><i class="fas fa-mobile-alt"></i> Phones</a></li>
                <li><a href="product-list.html"><i class="fas fa-headphones"></i> Accessories</a></li>
                <li><a href="product-list.html"><i class="fas fa-tag"></i> Sale</a></li>
            </ul>
        </nav>
    </div>
</header>

        <main class="login-page-main">
            <div class="login-card">
                <div class="login-card-header">
                    <h1 class="login-title">Create Account</h1>
                    <p class="login-subtitle">Join ElectroHub and start shopping</p>
                </div>

                <form class="login-form" id="register-form">
                    <!-- First Name -->
                    <div class="login-field">
                        <label for="first-name" class="visually-hidden">First Name</label>
                        <div class="login-input-wrap">
                            <span class="login-input-icon"><i class="fas fa-user"></i></span>
                            <input type="text" id="first-name" class="login-input" placeholder="First Name" required>
                        </div>
                    </div>

                    <!-- Last Name -->
                    <div class="login-field">
                        <label for="last-name" class="visually-hidden">Last Name</label>
                        <div class="login-input-wrap">
                            <span class="login-input-icon"><i class="fas fa-user"></i></span>
                            <input type="text" id="last-name" class="login-input" placeholder="Last Name" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="login-field">
                        <label for="register-email" class="visually-hidden">Email Address</label>
                        <div class="login-input-wrap">
                            <span class="login-input-icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="register-email" class="login-input" placeholder="Email Address" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="login-field">
                        <label for="register-password" class="visually-hidden">Password</label>
                        <div class="login-input-wrap">
                            <span class="login-input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="register-password" class="login-input" placeholder="Password (min. 8 characters)" required minlength="8">
                            <button type="button" class="login-toggle-pw" id="toggle-password-1" aria-label="Show password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="login-field">
                        <label for="confirm-password" class="visually-hidden">Confirm Password</label>
                        <div class="login-input-wrap">
                            <span class="login-input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="confirm-password" class="login-input" placeholder="Confirm Password" required minlength="8">
                            <button type="button" class="login-toggle-pw" id="toggle-password-2" aria-label="Show password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="login-remember" style="margin: var(--spacing-md) 0;">
                        <input type="checkbox" id="terms-agree" required>
                        <label for="terms-agree">I agree to the <a href="#" style="color: var(--primary); text-decoration: none;">Terms &amp; Conditions</a> and <a href="#" style="color: var(--primary); text-decoration: none;">Privacy Policy</a></label>
                    </div>

                    <!-- Feedback -->
                    <div class="login-feedback" id="reg-feedback" style="display: none;"></div>

                    <!-- Submit Button -->
                    <button type="submit" class="login-submit" id="register-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <!-- Divider -->
                <div class="login-divider">
                    <span>Already have an account?</span>
                </div>

                <!-- Sign In Link -->
                <button type="button" class="login-register-btn" onclick="window.location.href='login.html'">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </div>
        </main>

        <footer class="footer-wrap">
    <div class="container-xl footer-content">
        <nav class="footer-nav-links" aria-label="Footer links">
            <a href="index.html">Domov</a>
            <a href="#">Podmienky</a>
            <a href="product-list.html">Produkty</a>
            <a href="#">Kontakt</a>
        </nav>
        <div class="footer-brand">
            <span>ElectroHub</span>
        </div>
    </div>
</footer>
    </div>

    <script src="register.js"></script>
</body>
</html>
