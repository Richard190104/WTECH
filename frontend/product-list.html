<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Computers & Electronics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <header class="border-wrap">
            <div class="header-top">
                <div class="container-xl d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <nav>
                        <ul class="list-unstyled d-flex align-items-center mb-0 small m-0 top-links">
                            <li><a href="#">Articles & Support</a></li>
                            <li class="divider">|</li>
                            <li><a href="#">Contact Us</a></li>
                            <li class="divider">|</li>
                            <li><a href="#">Track Order</a></li>
                        </ul>
                    </nav>

                    <form class="d-flex align-items-center gap-2 auth-form" action="#">
                        <input type="email" class="form-control form-control-sm neutral-input" placeholder="email" aria-label="email">
                        <input type="password" class="form-control form-control-sm neutral-input" placeholder="password" aria-label="password">
                        <button type="submit" class="btn btn-sm neutral-btn">Login</button>
                        <a href="register.html" class="small register-link">Register</a>
                    </form>
                </div>
            </div>

            <div class="border-bottom-wrap">
                <div class="container-xl py-2">
                    <div class="row g-3 align-items-center">
                        <div class="col-12 col-md-2">
                            <a class="logo-box text-decoration-none text-reset" href="index.html">ElectroHub</a>
                        </div>
                        <div class="col-12 col-md-7">
                            <div class="input-group">
                                <span class="input-group-text" style="background: transparent; border: 1px solid var(--border); border-right: none;">
                                    <i class="fas fa-search"></i>
                                </span>
                                <input type="search" class="form-control neutral-search" placeholder="Search for products..." aria-label="Search for products" style="border-left: none;">
                            </div>
                        </div>
                        <div class="col-12 col-md-3 d-flex gap-2 justify-content-md-end">
                            <a class="btn cart-btn" href="cart.html">
                                <i class="fas fa-shopping-cart"></i>
                                Cart
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <nav class="container-xl py-1">
                    <ul class="list-unstyled d-flex flex-wrap gap-4 mb-0 category-links">
                        <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                        <li><a href="product-list.html"><i class="fas fa-laptop"></i> Products</a></li>

                    </ul>
                </nav>
            </div>
        </header>

        <main class="container-xl mt-3 pb-5">
            <nav class="pdp-breadcrumb" aria-label="Breadcrumb">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <span>&gt;</span>
                <span>Products</span>
            </nav>

            <h1 class="plp-category-title">Computers & Electronics</h1>

            <div class="plp-layout">
                <aside class="plp-sidebar" aria-label="Product filters">
                    <div class="plp-filter-card">
                        <h2 class="plp-filter-heading">Price Range</h2>
                        <div class="plp-price-inputs">
                            <div class="plp-price-field">
                                <label for="price-min" class="visually-hidden">Min price</label>
                                <span class="plp-price-prefix">$</span>
                                <input type="number" id="price-min" class="plp-price-input" value="" min="0" placeholder="0">
                            </div>
                            <span class="plp-price-sep">—</span>
                            <div class="plp-price-field">
                                <label for="price-max" class="visually-hidden">Max price</label>
                                <span class="plp-price-prefix">$</span>
                                <input type="number" id="price-max" class="plp-price-input" value="" min="0" placeholder="2000">
                            </div>
                        </div>
                        <input type="range" id="price-range" class="plp-range" min="0" max="2000" value="2000" aria-label="Maximum price">
                    </div>

                    <div class="plp-filter-card">
                        <h2 class="plp-filter-heading">Brand</h2>
                        <div class="plp-check-list">
                            <p class="small text-muted mb-0">Loading brands from API...</p>
                        </div>
                    </div>

                    <div class="plp-filter-card">
                        <h2 class="plp-filter-heading">Availability</h2>
                        <div class="plp-check-list">
                            <label class="plp-check-item">
                                <input type="checkbox" id="availability-in-stock"> In stock only
                            </label>
                        </div>
                    </div>

                    <div class="plp-filter-card">
                        <h2 class="plp-filter-heading">Rating</h2>
                        <div class="plp-check-list">
                            <label class="plp-check-item" for="rating-filter-select" style="width: 100%;">
                                Minimum rating
                                <select id="rating-filter-select" class="plp-sort-select" style="width: 100%; margin-top: 8px;">
                                    <option value="">Any rating</option>
                                    <option value="4">4.0 & up</option>
                                    <option value="4.5">4.5 & up</option>
                                    <option value="5">5.0 only</option>
                                </select>
                            </label>
                        </div>
                    </div>

                    <button type="button" class="plp-reset-btn" id="reset-filters">
                        <i class="fas fa-undo"></i> Reset Filters
                    </button>
                </aside>

                <div class="plp-content">
                    <div class="plp-toolbar">
                        <p class="plp-result-count" id="result-count">Loading products...</p>
                        <div class="plp-toolbar-right">
                            <label for="sort-select" class="plp-sort-label">Sort by:</label>
                            <select id="sort-select" class="plp-sort-select">
                                <option value="price_asc">Price: Low to High</option>
                                <option value="price_desc">Price: High to Low</option>
                                <option value="rating_desc">Top Rated</option>
                                <option value="newest">Newest</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3" id="product-grid"></div>

                    <nav class="plp-pagination" aria-label="Page navigation"></nav>
                </div>
            </div>
        </main>

        <footer class="footer-wrap">
            <div class="container-xl footer-content">
                <nav class="footer-nav-links" aria-label="Footer links">
                    <a href="index.html">Domov</a>
                    <a href="#">Podmienky</a>
                    <a href="product-list.html">Produkty</a>
                    <a href="#">Kontakt</a>
                </nav>
                <div class="footer-brand">
                    <span>ElectroHub</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="api.js"></script>
    <script src="product-list.js"></script>
</body>
</html>
