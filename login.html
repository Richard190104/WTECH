<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="shop-page">
    <div class="page-shell">
        <div id="site-header"></div>

        <main class="login-page-main">
            <div class="login-card">
                <div class="login-card-header">
                    <div class="login-logo">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <h1 class="login-title">Welcome back</h1>
                    <p class="login-subtitle">Sign in to your ElectroHub account</p>
                </div>

                <form class="login-form" id="login-form" novalidate>
                    <div class="login-field">
                        <label for="login-email">Email address</label>
                        <div class="login-input-wrap">
                            <i class="fas fa-envelope login-input-icon"></i>
                            <input
                                type="email"
                                id="login-email"
                                name="email"
                                class="login-input"
                                placeholder="you@example.com"
                                autocomplete="email"
                                required
                            >
                        </div>
                    </div>

                    <div class="login-field">
                        <div class="login-label-row">
                            <label for="login-password">Password</label>
                            <a href="#" class="login-forgot">Forgot password?</a>
                        </div>
                        <div class="login-input-wrap">
                            <i class="fas fa-lock login-input-icon"></i>
                            <input
                                type="password"
                                id="login-password"
                                name="password"
                                class="login-input"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="login-toggle-pw" id="toggle-password" aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="toggle-pw-icon"></i>
                            </button>
                        </div>
                    </div>

                    <label class="login-remember">
                        <input type="checkbox" id="remember-me" name="remember">
                        <span>Remember me</span>
                    </label>

                    <p class="login-feedback" id="login-feedback" aria-live="polite"></p>

                    <button type="submit" class="login-submit">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>

                    <div class="login-divider"><span>or</span></div>

                    <a href="register.html" class="login-register-btn">
                        <i class="fas fa-user-plus"></i> Create an account
                    </a>
                </form>
            </div>
        </main>

        <div id="site-footer"></div>
    </div>

    <script src="layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const feedback = document.getElementById('login-feedback');
            const toggleBtn = document.getElementById('toggle-password');
            const pwInput = document.getElementById('login-password');
            const pwIcon = document.getElementById('toggle-pw-icon');

            toggleBtn.addEventListener('click', () => {
                const isText = pwInput.type === 'text';
                pwInput.type = isText ? 'password' : 'text';
                pwIcon.classList.toggle('fa-eye', isText);
                pwIcon.classList.toggle('fa-eye-slash', !isText);
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                feedback.className = 'login-feedback';
                feedback.textContent = '';

                if (!email || !password) {
                    feedback.textContent = 'Please fill in all fields.';
                    feedback.classList.add('error');
                    return;
                }

                // Placeholder — replace with real auth logic
                feedback.textContent = 'Signing in...';
                feedback.classList.add('info');

                setTimeout(() => {
                    feedback.textContent = 'Login successful! Redirecting...';
                    feedback.classList.remove('info');
                    feedback.classList.add('success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                }, 800);
            });
        });
    </script>
</body>
</html>
